<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Log – Time Tracker</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #4CAF50;
      --green-link: #388E3C;
      --bg: #FAFAFA;
      --text: #212121;
      --muted: #757575;
      --divider: #e0e0e0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --green-link: #66BB6A;
        --bg: #303030;
        --text: #EEEEEE;
        --muted: #9E9E9E;
        --divider: #424242;
      }
    }

    body {
      font-family: "Roboto", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px 48px;
      text-align: center;
    }

    .app-icon {
      width: 120px;
      height: 120px;
      border-radius: 26px;
      margin-bottom: 48px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .tagline {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 48px;
    }

    /* ── Store badges ── */
    .stores {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }

    .store-badge {
      display: block;
      height: 48px;
      transition: opacity 0.15s;
    }

    .store-badge:hover { opacity: 0.8; }

    /* Google Play badge is taller than App Store badge at same visual size */
    .badge-google {
      height: 72px;
      margin: -12px 0; /* optical alignment */
    }

    /* ── Footer ── */
    footer {
      padding: 24px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid var(--divider);
    }

    footer a {
      color: var(--green-link);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      h1 { font-size: 1.75rem; }
      .stores { flex-direction: column; }
      .badge-google { margin: -8px 0; }
    }
  </style>
</head>
